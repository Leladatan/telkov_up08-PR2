<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../../assetes/css/normalize.css">
    <link rel="stylesheet" href="../../assetes/css/settings.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="wrap__header">
                <div class="header__menu">
                    <div class="header__logo">
                        <a href="#"><img src="../../assetes/img/home/logo.png" alt="logo(box)"></a>
                        <h1 class="logo-text"><a href="#">Abito</a></h1>
                    </div>
                    <nav class="header__nav">
                        <ul>
                            <li class="header__nav_items"><a href="#">Авто</a></li>
                            <li class="header__nav_items"><a href="#">Недвижимость</a></li>
                            <li class="header__nav_items"><a href="#">Работа</a></li>
                            <li class="header__nav_items"><a href="#">Услуги</a></li>
                        </ul>
                    </nav>
                </div>
                <div class="header__login">
                    <button class="btn">Вход регистрация</button>
                    <button class="btn_blue">Подать заявление</button>
                </div>
            </div>
            <div class="search">
                <div class="search__main">
                    <input type="text" placeholder="Поиск по объявлениям">
                    <img src="../../assetes/img/home/search.png" alt="search" class="search__right">
                    <p class="search__text">Найти</p>
                </div>  
            </div>
        </header>
        <main class="main">
                <footer class="footer">
                    <div class="footer__content">
                        <p>© ООО «Абито», 2011–2021</p>
                        <p><a class="footer_item" href="#">Политика конфиденциальности</a></p>
                        <p><a class="footer_item" href="#">Обработка данных</a></p>
                    </div>
                    <div class="footer__menu">
                        <a class="footer__menu_item" href="#">Реклама на сайте</a>
                        <a class="footer__menu_item"  href="#">Вакансии</a>
                        <a class="footer__menu_item"  href="#">Помощь</a>
                    </div>
                </footer>
            </div>
        </main>
    </div>

</html>
